<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" width="168" height="126">
  <style>
    .codebuddy-body {
      animation: jump 0.5s ease-in-out infinite;
      transform-origin: center bottom;
    }
    .shadow {
      animation: shadow-scale 0.5s ease-in-out infinite;
    }
    @keyframes jump {
      0%, 100% { transform: translateY(0) scaleY(1) scaleX(1); }
      30% { transform: translateY(-16px) scaleY(1.1) scaleX(0.95); }
      50% { transform: translateY(-18px) scaleY(1.05) scaleX(0.98); }
      80% { transform: translateY(-5px) scaleY(0.95) scaleX(1.05); }
    }
    @keyframes shadow-scale {
      0%, 100% { transform: scaleX(1); opacity: 0.25; }
      50% { transform: scaleX(0.4); opacity: 0.08; }
    }
  </style>

  <!-- Shadow -->
  <ellipse class="shadow" cx="60" cy="85" rx="30" ry="6" fill="#000"/>

  <!-- CodeBuddy Character Group -->
  <g class="codebuddy-body">
    <path fill="#2CC295" fill-rule="evenodd" shape-rendering="crispEdges" d="
      M 20 10 H 40 V 20 H 80 V 10 H 100 V 30 H 110 V 70 H 100 V 80 H 20 V 70 H 10 V 30 H 20 Z 
      M 30 30 V 70 H 90 V 30 Z 
      M 40 40 H 50 V 60 H 40 Z 
      M 70 40 H 80 V 60 H 70 Z
    "/>
  </g>
</svg>