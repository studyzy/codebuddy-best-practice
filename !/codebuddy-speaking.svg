<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" width="224" height="126">
  <style>
    .codebuddy-body {
      animation: bob 0.8s ease-in-out infinite;
      transform-origin: center bottom;
    }
    .shadow {
      animation: shadow-pulse 0.8s ease-in-out infinite;
    }
    .wave-1 {
      animation: wave-expand 0.8s ease-out infinite;
      transform-origin: left center;
    }
    .wave-2 {
      animation: wave-expand 0.8s ease-out infinite 0.2s;
      transform-origin: left center;
    }
    .wave-3 {
      animation: wave-expand 0.8s ease-out infinite 0.4s;
      transform-origin: left center;
    }
    .note-1 {
      animation: float-note-1 1.5s ease-out infinite;
    }
    .note-2 {
      animation: float-note-2 1.5s ease-out infinite 0.3s;
    }
    .note-3 {
      animation: float-note-3 1.5s ease-out infinite 0.6s;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes shadow-pulse {
      0%, 100% { transform: scaleX(1); opacity: 0.25; }
      50% { transform: scaleX(0.9); opacity: 0.2; }
    }
    @keyframes wave-expand {
      0% { opacity: 0.8; transform: scaleX(0.3) scaleY(0.8); }
      100% { opacity: 0; transform: scaleX(1.2) scaleY(1); }
    }
    @keyframes float-note-1 {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      100% { opacity: 0; transform: translate(15px, -25px) rotate(15deg); }
    }
    @keyframes float-note-2 {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      100% { opacity: 0; transform: translate(20px, -30px) rotate(-10deg); }
    }
    @keyframes float-note-3 {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      100% { opacity: 0; transform: translate(10px, -35px) rotate(20deg); }
    }
  </style>

  <!-- Shadow -->
  <ellipse class="shadow" cx="60" cy="85" rx="30" ry="6" fill="#000"/>

  <!-- Sound Waves (curved arcs) -->
  <g class="wave-1">
    <path d="M 115 44 Q 123 44, 123 52 Q 123 60, 115 60" fill="none" stroke="#2CC295" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g class="wave-2">
    <path d="M 119 38 Q 131 38, 131 52 Q 131 66, 119 66" fill="none" stroke="#2CC295" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g class="wave-3">
    <path d="M 123 32 Q 139 32, 139 52 Q 139 72, 123 72" fill="none" stroke="#2CC295" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Musical Notes -->
  <!-- Note 1 - Eighth note -->
  <g class="note-1">
    <ellipse cx="131" cy="28" rx="4" ry="3" fill="#2CC295" transform="rotate(-20, 131, 28)"/>
    <rect x="134" y="12" width="2" height="16" fill="#2CC295"/>
    <path d="M 136 12 Q 141 14, 141 18 Q 141 22, 136 20" fill="#2CC295"/>
  </g>

  <!-- Note 2 - Quarter note -->
  <g class="note-2">
    <ellipse cx="145" cy="22" rx="4" ry="3" fill="#2CC295" transform="rotate(-20, 145, 22)"/>
    <rect x="148" y="6" width="2" height="16" fill="#2CC295"/>
  </g>

  <!-- Note 3 - Double eighth note (beamed) -->
  <g class="note-3">
    <ellipse cx="138" cy="42" rx="3" ry="2.5" fill="#2CC295" transform="rotate(-20, 138, 42)"/>
    <ellipse cx="148" cy="40" rx="3" ry="2.5" fill="#2CC295" transform="rotate(-20, 148, 40)"/>
    <rect x="140" y="26" width="2" height="16" fill="#2CC295"/>
    <rect x="150" y="24" width="2" height="16" fill="#2CC295"/>
    <rect x="140" y="26" width="12" height="2" fill="#2CC295"/>
  </g>

  <!-- CodeBuddy Character Group -->
  <g class="codebuddy-body">
    <path fill="#2CC295" fill-rule="evenodd" shape-rendering="crispEdges" d="
      M 20 10 H 40 V 20 H 80 V 10 H 100 V 30 H 110 V 70 H 100 V 80 H 20 V 70 H 10 V 30 H 20 Z 
      M 30 30 V 70 H 90 V 30 Z 
      M 40 40 H 50 V 60 H 40 Z 
      M 70 40 H 80 V 60 H 70 Z
    "/>
  </g>
</svg>